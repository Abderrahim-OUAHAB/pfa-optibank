<div class="dashboard-container">
  <h2>Tableau de bord Administrateur</h2>

  <div class="stats-grid">
    <div class="stat-card">
      <h3>Comptes</h3>
      <p>{{ accountCount }}</p>
    </div>

    <div class="stat-card">
      <h3>Transactions</h3>
      <p>{{ transactions.length }}</p>
    </div>

    <div class="stat-card">
      <h3>Solde Total</h3>
      <p>{{ totalBalance | currency:'EUR':'symbol':'1.2-2' }}</p>
    </div>

    <div class="stat-card fraud">
      <h3>Fraudes</h3>
      <p>{{ fraudCount }}</p>
    </div>

    <div class="stat-card legit">
      <h3>Valides</h3>
      <p>{{ legitimateCount }}</p>
    </div>
  </div>

  <div class="chart-section">
    <div class="chart-box">
      <h4>Répartition des Transactions</h4>
      <canvas baseChart
              [data]="pieChartData"
              [type]="pieChartType"
              [options]="pieChartOptions"
              style="display: block; height: 400px; width: 100%">
      </canvas>
    </div>

    <div class="chart-box">
      <h4>Transactions par Type</h4>
      <canvas baseChart
              [data]="barChartData"
              [type]="barChartType"
              [options]="barChartOptions"
              style="display: block; height: 400px; width: 100%">
      </canvas>
    </div>
  </div>
</div>
